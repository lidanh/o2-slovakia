<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You have been invited to O2 Trainer</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f5f7; padding: 40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08); overflow: hidden;">
          <!-- Header -->
          <tr>
            <td style="background: linear-gradient(135deg, #0112AA, #2563EB); padding: 36px 40px; text-align: center;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <div style="font-size: 32px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px;">O2 Trainer</div>
                    <div style="font-size: 13px; color: rgba(255, 255, 255, 0.7); margin-top: 4px; letter-spacing: 0.5px;">TRAINING PLATFORM</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 40px 40px 32px;">
              <h1 style="margin: 0 0 12px; font-size: 22px; font-weight: 600; color: #1a1a2e; letter-spacing: -0.3px;">You've been invited</h1>
              <p style="margin: 0 0 28px; font-size: 15px; line-height: 1.6; color: #6B7280;">
                You've been invited to join the O2 Trainer platform. Click the button below to set up your password and get started.
              </p>
              <!-- CTA Button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=invite"
                       style="display: inline-block; padding: 14px 40px; background: linear-gradient(135deg, #0112AA, #2563EB); color: #ffffff; font-size: 15px; font-weight: 600; text-decoration: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(1, 18, 170, 0.3);">
                      Accept Invitation
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin: 28px 0 0; font-size: 13px; line-height: 1.5; color: #9CA3AF;">
                If you didn't expect this invitation, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 20px 40px 28px; border-top: 1px solid #f0f0f0; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #C0C0C0;">O2 Trainer Platform</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
